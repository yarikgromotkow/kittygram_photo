$kind: http-request
name: Создать достижение (POST /achievements/)
url: "{{base_url}}/achievements/"
method: POST
headers:
  Authorization: Bearer {{token}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "achievement_name": "Ловкач"
    }
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 201) {
          pm.collectionVariables.set('ach_id', String(pm.response.json().id));
      }
    language: text/javascript
order: 2000
