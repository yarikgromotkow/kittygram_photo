$kind: http-request
name: Обновить токен (POST /auth/jwt/refresh/)
url: "{{base_url}}/auth/jwt/refresh/"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "refresh": "{{refresh}}"
    }
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 200 || pm.response.code === 201) {
          pm.collectionVariables.set('token', pm.response.json().access);
      }
    language: text/javascript
order: 2000
