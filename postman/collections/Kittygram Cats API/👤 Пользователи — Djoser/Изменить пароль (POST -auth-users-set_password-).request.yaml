$kind: http-request
name: Изменить пароль (POST /auth/users/set_password/)
url: "{{base_url}}/auth/users/set_password/"
method: POST
headers:
  Authorization: Bearer {{token}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "current_password": "admin123",
      "new_password": "newpass456"
    }
order: 8000
