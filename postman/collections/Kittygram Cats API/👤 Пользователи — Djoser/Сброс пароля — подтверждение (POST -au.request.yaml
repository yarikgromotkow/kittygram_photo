$kind: http-request
name: Сброс пароля — подтверждение (POST /auth/users/reset_password_confirm/)
url: "{{base_url}}/auth/users/reset_password_confirm/"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "uid": "<uid из письма>",
      "token": "<token из письма>",
      "new_password": "newpass123"
    }
order: 11000
