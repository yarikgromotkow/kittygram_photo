services:
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-kittygram}
      POSTGRES_USER: ${DB_USER:-kittygram_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kittygram_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kittygram_user} -d ${DB_NAME:-kittygram}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-kittygram-dev-key-change-in-production}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-kittygram}
      DB_USER: ${DB_USER:-kittygram_user}
      DB_PASSWORD: ${DB_PASSWORD:-kittygram_pass}
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
